name: Android — Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kod źródłowy ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js + web build ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor)
        run: npm run build:cap

      # ── 3. Java 21 ───────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # ── 4. Capacitor sync ─────────────────────────────────────────────────
      - name: Capacitor sync (Android)
        run: npx cap sync android

      # ── 5. Keystore z GitHub Secrets ─────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      # ── 6. Wersja ─────────────────────────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-v1.0.0}"
          VER_NAME="${TAG#v}"
          VER_CODE="${{ github.run_number }}"
          echo "name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "code=$VER_CODE" >> $GITHUB_OUTPUT

      # ── 7. Build podpisanego APK ──────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      # ── 8. Build AAB (do wgrania na Play Console) ─────────────────────────
      - name: Build release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      # ── 9. GitHub Release z APK i AAB ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CiekawostkoMania ${{ steps.version.outputs.name }}"
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
