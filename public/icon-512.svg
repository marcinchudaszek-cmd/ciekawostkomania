<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bulb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4c1d95" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Tło -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Dekoracyjne kółka w tle -->
  <circle cx="60" cy="80" r="40" fill="#818cf8" opacity="0.3"/>
  <circle cx="450" cy="420" r="55" fill="#7c3aed" opacity="0.4"/>
  <circle cx="420" cy="70" r="30" fill="#a78bfa" opacity="0.25"/>
  <circle cx="90" cy="430" r="35" fill="#6d28d9" opacity="0.3"/>

  <!-- Małe gwiazdki/iskry -->
  <circle cx="380" cy="130" r="6" fill="#fde68a" opacity="0.8"/>
  <circle cx="140" cy="370" r="5" fill="#fde68a" opacity="0.7"/>
  <circle cx="410" cy="280" r="4" fill="#fde68a" opacity="0.6"/>
  <circle cx="110" cy="190" r="5" fill="#fde68a" opacity="0.6"/>

  <!-- Żarówka — cień -->
  <ellipse cx="256" cy="230" rx="72" ry="68" fill="#4c1d95" opacity="0.3" transform="translate(4,6)"/>

  <!-- Żarówka — szkło -->
  <ellipse cx="256" cy="226" rx="72" ry="68" fill="url(#bulb)" filter="url(#shadow)"/>

  <!-- Blask na żarówce -->
  <ellipse cx="236" cy="200" rx="22" ry="30" fill="url(#glow)" opacity="0.7"/>

  <!-- Wewnętrzne linie żarówki (filament) -->
  <path d="M 236 288 Q 230 298 230 308 L 282 308 Q 282 298 276 288 Z" fill="#d97706"/>
  <rect x="230" y="308" width="52" height="8" rx="2" fill="#92400e"/>
  <rect x="234" y="316" width="44" height="7" rx="2" fill="#92400e"/>
  <rect x="238" y="323" width="36" height="6" rx="2" fill="#92400e"/>

  <!-- Promienie świecenia -->
  <g opacity="0.6" filter="url(#glow-filter)">
    <line x1="256" y1="140" x2="256" y2="112" stroke="#fde68a" stroke-width="5" stroke-linecap="round"/>
    <line x1="316" y1="160" x2="336" y2="142" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>
    <line x1="340" y1="220" x2="368" y2="216" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>
    <line x1="196" y1="160" x2="176" y2="142" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>
    <line x1="172" y1="220" x2="144" y2="216" stroke="#fde68a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Wykrzyknik w żarówce -->
  <rect x="248" y="196" width="16" height="52" rx="6" fill="#7c3aed"/>
  <circle cx="256" cy="268" r="9" fill="#7c3aed"/>

  <!-- Tekst CM na dole -->
  <text x="256" y="430" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle" opacity="0.95" letter-spacing="-2">CM</text>
</svg>
